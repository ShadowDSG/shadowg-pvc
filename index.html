<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth overflow-x-hidden max-w-full">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ShadowG的攝影小屋 - 360° Figure Studio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] },
                    colors: {
                        studio: { 50: '#f5f3ff', 100: '#ede9fe', 800: '#3c096c', 900: '#240046', 950: '#10002b' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        html, body { zoom: 1.1; max-width: 100%; overflow-x: hidden; position: relative; overscroll-behavior-x: none; }
        @media (min-width: 1024px) { html { zoom: 1.15; } }
        body {
            background-image: radial-gradient(circle at top, rgba(15, 23, 42, 0.85) 0%, rgba(2, 6, 23, 0.98) 100%), url('https://pub-94ae3cd9057e4dcabe3910431b5fea5a.r2.dev/banner.jpg');
            background-attachment: fixed; background-size: cover; background-position: center;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .glow-card:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.25); border-color: rgba(139, 92, 246, 0.4); }
        @keyframes orbit { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .glowing-orb { position: absolute; top: 50%; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%); transform: translate(-50%, -50%); z-index: 0; pointer-events: none; animation: orbit 20s linear infinite; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen relative overflow-x-hidden antialiased">

    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0 max-w-full">
        <div class="glowing-orb"></div>
    </div>

    <nav class="sticky top-0 z-40 w-full glass-panel border-b border-slate-800/60 py-3 px-6 sm:px-8 md:px-12">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-3 group">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 to-fuchsia-600 flex items-center justify-center text-white shadow-lg shadow-violet-500/20 group-hover:scale-105 transition-all duration-300">
                    <i class="fa-solid fa-camera-rotate text-lg"></i>
                </div>
                <div>
                    <span class="text-base md:text-lg font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-violet-400 to-fuchsia-400 group-hover:opacity-90 transition-opacity">ShadowG's Studio</span>
                    <span class="block text-[10px] text-slate-400 tracking-widest font-medium">FIGURE 360° PORTFOLIO</span>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <a href="https://three60manager.onrender.com/manager.html" target="_blank" rel="noopener" class="h-9 px-6 rounded-lg bg-slate-800/80 hover:bg-emerald-500 hover:text-white flex items-center justify-center gap-2 text-slate-300 transition-all duration-300 text-sm font-medium">
                    <i class="fa-solid fa-cloud-arrow-up text-base"></i><span>管理</span>
                </a>
            </div>
        </div>
    </nav>

    <header class="relative overflow-hidden pt-10 pb-12 px-6 sm:px-8 md:px-12">
        <div class="max-w-5xl mx-auto text-center relative z-10">
            <h1 class="text-3xl md:text-6xl font-black tracking-tight mb-5 bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-100 to-slate-400">ShadowG 的攝影小屋</h1>
            <p class="text-sm md:text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">Figure (美少女模型) 360 度環繞展廳。</p>
        </div>
    </header>

    <main id="galleries" class="max-w-7xl mx-auto px-6 sm:px-8 md:px-12 pb-24 relative z-10">
        <div class="glass-panel rounded-2xl p-4 md:p-6 mb-8 shadow-xl border border-slate-800/80">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="w-full relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="figureSearch" oninput="filterFigures()" placeholder="搜尋名稱、作品或品牌..." class="w-full pl-11 pr-10 py-3 bg-slate-950/80 border border-slate-800 rounded-xl focus:border-violet-500 text-sm outline-none transition-all" />
                </div>
                <div class="flex gap-2 shrink-0">
                    <button id="sortFeaturedBtn" onclick="toggleSort('featured')" class="px-4 py-3 rounded-xl bg-violet-600 text-white text-sm font-semibold shadow-lg shadow-violet-500/20">精選排序</button>
                    <button id="sortTimeBtn" onclick="toggleSort('time')" class="px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 text-sm font-semibold">時間排序</button>
                </div>
            </div>
        </div>

        <div id="galleryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVmV57KOKBgd0UJs-N-eqWu8dJGn7J-kk",
            authDomain: "figurestudio-bdd7f.firebaseapp.com",
            projectId: "figurestudio-bdd7f",
            storageBucket: "figurestudio-bdd7f.firebasestorage.app",
            messagingSenderId: "280890475667",
            appId: "1:280890475667:web:27adeec7d4191974213966"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.figuresDataset = [];
        let searchQuery = '';
        let currentSortMode = 'featured'; 

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "figures"));
                window.figuresDataset = querySnapshot.docs.map(doc => doc.data());
                renderFiguresGrid();
            } catch (error) { console.error("資料讀取失敗", error); }
        });

        window.toggleSort = (type) => {
            currentSortMode = (type === 'featured') ? 'featured' : (currentSortMode === 'timeDesc' ? 'timeAsc' : 'timeDesc');
            renderFiguresGrid();
        };

        window.filterFigures = () => {
            searchQuery = document.getElementById('figureSearch').value.toLowerCase();
            renderFiguresGrid();
        };

        function renderFiguresGrid() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            const filtered = window.figuresDataset.filter(f => 
                f.title.toLowerCase().includes(searchQuery) || (f.brand || '').toLowerCase().includes(searchQuery)
            ).sort((a, b) => {
                if (currentSortMode === 'featured') {
                    if (a.featured !== b.featured) return b.featured ? 1 : -1;
                    if (a.featured) return (a.featuredOrderIndex || 0) - (b.featuredOrderIndex || 0);
                    return (a.orderIndex || 0) - (b.orderIndex || 0);
                } else {
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return currentSortMode === 'timeDesc' ? timeB - timeA : timeA - timeB;
                }
            });

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = "group relative bg-slate-900/40 border border-slate-900 rounded-2xl overflow-hidden cursor-pointer hover:-translate-y-2 transition-all duration-300";
                card.onclick = () => window.location.href = `viewer.html?id=${f.id}`;
                card.innerHTML = `
                    <div class="aspect-[4/5] relative bg-slate-950">
                        <img src="https://pub-94ae3cd9057e4dcabe3910431b5fea5a.r2.dev/thumbs/${f.img}" class="object-cover w-full h-full">
                        ${f.featured ? '<span class="absolute top-2 right-2 px-2 py-0.5 rounded text-[10px] font-bold bg-amber-500/20 text-amber-300 border border-amber-500/30">PICKUP</span>' : ''}
                    </div>
                    <div class="p-3"><h3 class="text-sm font-bold text-slate-200 truncate">${f.title}</h3><p class="text-[10px] text-slate-500">${f.brand}</p></div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
